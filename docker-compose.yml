services:
  api:
    build:
      context: .
      dockerfile: src/ProvaPratica.Api/Dockerfile
    container_name: prova-pratica_api
    ports:
      - "5000:8080"
    depends_on:
      - db
      - minio
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=provapraticadb;Username=meuusuario;Password=minhasenha123456
      - Storage__ServiceUrl=http://minio:9000
      - Storage__PublicUrl=http://localhost:9000
      - Storage__AccessKey=${MINIO_ROOT_USER}
      - Storage__SecretKey=${MINIO_ROOT_PASSWORD}
      - Storage__BucketName=produtos
      - Storage__ForcePathStyle=true

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data: